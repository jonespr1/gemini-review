# Reusable AI PR-review workflow (self-contained, model-agnostic).
#
# Fetches the PR diff, sends it to an AI model in ONE call, and posts the review as
# a PR comment. No GitHub MCP server, no code-review extension, no agentic tool-loop
# — so it can't break the way the official run-gemini-cli flow currently does.
#
# DEFAULT: Google Gemini (gemini-2.5-flash), using the GEMINI_API_KEY secret.
#
# To use an OpenAI-compatible provider instead (e.g. GLM 5.2 via Telnyx), set these
# repository Variables on the target repo (Settings -> Secrets and variables -> Actions
# -> Variables) and store that provider's key as the GEMINI_API_KEY secret:
#   AI_PROVIDER = openai
#   AI_MODEL    = <provider model id, e.g. glm-5.2>
#   AI_BASE_URL = <OpenAI-compatible base, e.g. https://api.telnyx.com/v2/ai>
#
# Optional per-repo tuning:
#   AI_MODEL variable overrides the model for either provider.
#   A .gemini/styleguide.md file in the repo is injected into the review prompt.
name: 'AI PR Review (reusable)'

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

concurrency:
  group: 'ai-review-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 8
    permissions:
      contents: 'read'
      pull-requests: 'write'
    steps:
      - name: 'Checkout (for optional .gemini/styleguide.md)'
        uses: 'actions/checkout@v4'
        with:
          persist-credentials: 'false'

      - name: 'AI review'
        shell: 'bash'
        env:
          GH_TOKEN: '${{ github.token }}'
          AI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          AI_PROVIDER: '${{ vars.AI_PROVIDER }}'
          AI_MODEL: '${{ vars.AI_MODEL }}'
          AI_BASE_URL: '${{ vars.AI_BASE_URL }}'
          REPO: '${{ github.repository }}'
          PR_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
        run: |
          set -euo pipefail

          PROVIDER="${AI_PROVIDER:-gemini}"
          if [ "$PROVIDER" = "gemini" ]; then
            MODEL="${AI_MODEL:-gemini-2.5-flash}"
          else
            MODEL="${AI_MODEL:-glm-5.2}"
          fi

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "No PR number in event context; nothing to review."
            exit 0
          fi
          echo "Reviewing PR #${PR_NUMBER} in ${REPO} using ${PROVIDER}/${MODEL}"

          # 1) Fetch the unified diff (cap size to keep the request reasonable).
          DIFF="$(gh pr diff "$PR_NUMBER" --repo "$REPO" || true)"
          if [ -z "$DIFF" ]; then
            echo "Empty diff; nothing to review."
            exit 0
          fi
          MAX=60000
          TRUNC_NOTE=""
          if [ "${#DIFF}" -gt "$MAX" ]; then
            DIFF="${DIFF:0:$MAX}"
            TRUNC_NOTE="

          > Note: the diff was long and was truncated; only the first part was reviewed."
          fi

          # 2) Optional per-repo style guide.
          STYLE=""
          if [ -f .gemini/styleguide.md ]; then
            STYLE="$(cat .gemini/styleguide.md)"
          fi

          # 3) Build the review prompt (printf keeps this robust against YAML indentation).
          INSTRUCTIONS="$(printf '%s\n' \
            'You are a senior software engineer acting as a second reviewer on a GitHub pull request.' \
            'Review the unified diff below and write a concise, high-signal review in GitHub markdown.' \
            '' \
            'Use exactly these sections (omit a severity bucket if it has no items):' \
            '## 📋 Summary — 2-3 sentences on what the PR does and its overall quality.' \
            '## 🔍 Findings — bullets grouped as 🔴 Critical, 🟠 High, 🟡 Medium, 🟢 Low.' \
            '  For each finding cite the file and approximate line, and give a specific, actionable fix.' \
            '## ✅ Positives — briefly note anything done well.' \
            '' \
            'Focus on correctness, security, performance, error handling and missing tests.' \
            'Only report real, verifiable issues; do not invent problems. If the diff is trivial or looks good, say so plainly.')"

          PROMPT="$INSTRUCTIONS"
          if [ -n "$STYLE" ]; then
            PROMPT="${PROMPT}

          Team style guide to enforce:
          ${STYLE}"
          fi
          PROMPT="${PROMPT}

          Unified diff to review:
          ${DIFF}"

          # 4) Call the model API (single request).
          if [ "$PROVIDER" = "gemini" ]; then
            REQ="$(jq -n --arg p "$PROMPT" '{contents:[{parts:[{text:$p}]}]}')"
            RESP="$(curl -sS -m 180 \
              "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${AI_API_KEY}" \
              -H 'Content-Type: application/json' -d "$REQ" || true)"
            REVIEW="$(printf '%s' "$RESP" | jq -r '.candidates[0].content.parts[0].text // empty')"
            ERR="$(printf '%s' "$RESP" | jq -r '.error.message // empty')"
          else
            BASE="${AI_BASE_URL:-https://api.telnyx.com/v2/ai}"
            REQ="$(jq -n --arg m "$MODEL" --arg p "$PROMPT" '{model:$m, messages:[{role:"user", content:$p}]}')"
            RESP="$(curl -sS -m 180 "${BASE%/}/chat/completions" \
              -H "Authorization: Bearer ${AI_API_KEY}" \
              -H 'Content-Type: application/json' -d "$REQ" || true)"
            REVIEW="$(printf '%s' "$RESP" | jq -r '.choices[0].message.content // empty')"
            ERR="$(printf '%s' "$RESP" | jq -r '.error.message // empty')"
          fi

          # 5) Compose and post the comment.
          if [ -z "$REVIEW" ]; then
            REVIEW="$(printf '%s\n' '⚠️ The AI review could not be generated.' '' '```' "${ERR:-No response text returned by the model.}" '```')"
          fi
          BODY="$(printf '## 🤖 AI Code Review — \`%s\`\n\n%s%s\n\n<sub>Automated review — not a substitute for human review.</sub>' "$MODEL" "$REVIEW" "$TRUNC_NOTE")"

          printf '%s' "$BODY" | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -
          echo "Posted AI review to PR #${PR_NUMBER}."
