# Reusable Gemini pull-request review workflow.
# Lives in the central repo (jonespr1/gemini-review) and is called by a tiny
# stub workflow in each target repo. Update this file to improve reviews
# everywhere at once. Contains NO secrets, so this repo can be public.
name: 'Gemini PR Review (reusable)'

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

concurrency:
  group: 'gemini-review-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          persist-credentials: 'false'

      - name: 'Run Gemini pull request review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GITHUB_TOKEN: '${{ github.token }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          # To pin a model for ALL repos, uncomment and set one value, e.g.
          #   gemini_model: 'gemini-2.5-pro'   # strongest reviews
          #   gemini_model: 'gemini-2.5-flash' # lighter, conserves free quota
          github_pr_number: '${{ github.event.pull_request.number || github.event.issue.number }}'
          settings: |-
            {
              "model": { "maxSessionTurns": 25 },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run", "-i", "--rm",
                    "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": { "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}" }
                }
              },
              "tools": { "core": [] }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: '/pr-code-review'
