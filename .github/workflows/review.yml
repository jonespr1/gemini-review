# Reusable Gemini pull-request review workflow.
# Lives in the central repo (jonespr1/gemini-review) and is called by a tiny
# stub workflow in each target repo. Update this file to improve reviews
# everywhere at once. Contains NO secrets, so this repo can be public.
name: 'Gemini PR Review (reusable)'

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

concurrency:
  group: 'gemini-review-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          persist-credentials: 'false'

      # The /pr-code-review command needs the repo + PR number as context. Without
      # this file the CLI runs but silently posts nothing (run-gemini-cli issue #265).
      - name: 'Prepare prompt context'
        shell: 'bash'
        env:
          REPOSITORY: '${{ github.repository }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
        run: |-
          mkdir -p .gemini
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg pr "${PULL_REQUEST_NUMBER}" \
            '{repository: $repo, pull_request_number: $pr}' > .gemini/context.json

      - name: 'Run Gemini pull request review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GITHUB_TOKEN: '${{ github.token }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          # FIX 1: the code-review extension's /pr-code-review command reads these from the
          # ENVIRONMENT (see the extension's GEMINI.md), not from .gemini/context.json.
          # Without them the model has no repo/PR to review and stalls with 0 tool calls.
          REPOSITORY: '${{ github.repository }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          ADDITIONAL_CONTEXT: ''
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_debug: 'true'   # TEMP: verbose logs while we confirm reviews post
          # 'gemini-pro-latest' is an alias to the current Pro model, so it won't 404 when a
          # specific version retires (as gemini-2.5-pro did for new users). ~20-30c per review.
          gemini_model: 'gemini-pro-latest'
          github_pr_number: '${{ github.event.pull_request.number || github.event.issue.number }}'
          settings: |-
            {
              "model": { "maxSessionTurns": 25 },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run", "-i", "--rm",
                    "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "pull_request_read",
                    "create_pending_pull_request_review",
                    "add_comment_to_pending_review",
                    "submit_pending_pull_request_review"
                  ],
                  "env": { "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}" }
                }
              },
              "tools": { "core": [] }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: '/pr-code-review'
