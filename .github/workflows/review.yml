# Reusable AI PR-review workflow (self-contained, model-agnostic, per-repo provider).
#
# Fetches the PR diff + prior review conversation, sends it to an AI model in ONE call,
# and posts the review as a PR comment. No MCP server / no agentic tool-loop.
#
# PROVIDER PER REPO (set as repo Variables on the target repo):
#   AI_PROVIDER = gemini (default) | openai
#   For openai (e.g. GLM 5.2 via OpenRouter):
#     AI_MODEL    = z-ai/glm-5.2
#     AI_BASE_URL = https://openrouter.ai/api/v1
#   Optional: GEMINI_MODEL (default gemini-flash-latest), AI_DUAL=true (always run both).
#
# KEYS (repo Secrets; the stub passes them with `secrets: inherit`):
#   GEMINI_API_KEY      — for the Gemini path
#   OPENROUTER_API_KEY  — for the OpenRouter/GLM path
#
# DUAL REVIEW: set repo Variable AI_DUAL=true, or comment `@gemini-cli /review-both`
# on a PR, to run BOTH models and post both reviews (broader coverage for critical PRs).
#
# PRIVACY + QUALITY + REDUNDANCY: OpenRouter requests use criteria-based routing
#   {only:<allow-list>, data_collection:"deny", sort:"throughput", allow_fallbacks:true}
# = trusted (non-Chinese) hosts only, no training on your data, FASTEST host first (never
# a slow host just because it is cheap), with automatic failover. Uptime/error avoidance is
# built into OpenRouter. Jurisdiction is guaranteed by the allow-list, NOT by zdr. Overrides:
#   AI_OR_PROVIDERS = "novita,fireworks"  (the allow-list; set by the bootstrap script)
#   AI_OR_SORT      = throughput|latency|price   (default throughput)
#   AI_OR_MAXPRICE  = "2,6"               (optional hard $/1M input,output ceiling)
name: 'AI PR Review (reusable)'

on:
  workflow_call:
    # Declared optional so both the new (secrets: inherit) stubs and any older
    # explicit-secret stubs work against this workflow without a rollout gap.
    secrets:
      GEMINI_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false

concurrency:
  group: 'ai-review-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      issues: 'read'
      pull-requests: 'write'
    steps:
      - name: 'Checkout (for optional .gemini/styleguide.md)'
        uses: 'actions/checkout@v4'
        with:
          persist-credentials: 'false'

      - name: 'AI review'
        shell: 'bash'
        env:
          GH_TOKEN: '${{ github.token }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          OPENROUTER_API_KEY: '${{ secrets.OPENROUTER_API_KEY }}'
          AI_PROVIDER: '${{ vars.AI_PROVIDER }}'
          AI_MODEL: '${{ vars.AI_MODEL }}'
          GEMINI_MODEL: '${{ vars.GEMINI_MODEL }}'
          AI_BASE_URL: '${{ vars.AI_BASE_URL }}'
          AI_DUAL: '${{ vars.AI_DUAL }}'
          AI_OR_PROVIDERS: '${{ vars.AI_OR_PROVIDERS }}'   # optional: restrict to these OpenRouter host slugs (e.g. "novita,fireworks,together") — still load-balanced with fallback
          AI_OR_MAXPRICE: '${{ vars.AI_OR_MAXPRICE }}'     # optional hard ceiling in $/1M "input,output" (e.g. "2,6") to exclude pricey hosts
          AI_OR_SORT: '${{ vars.AI_OR_SORT }}'             # provider selection: throughput (default, fastest) | latency | price
          COMMENT_BODY: '${{ github.event.comment.body }}'
          REPO: '${{ github.repository }}'
          PR_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then echo "No PR number; nothing to review."; exit 0; fi

          GMODEL="${GEMINI_MODEL:-gemini-flash-latest}"
          OMODEL="${AI_MODEL:-z-ai/glm-5.2}"
          OBASE="${AI_BASE_URL:-https://openrouter.ai/api/v1}"
          PRIMARY="${AI_PROVIDER:-gemini}"

          # Dual review if AI_DUAL=true, or the trigger comment asked for /review-both.
          DUAL=false
          [ "${AI_DUAL:-}" = "true" ] && DUAL=true
          case "${COMMENT_BODY:-}" in *"/review-both"*) DUAL=true;; esac

          # 1) Diff (truncate on a line boundary so we never send a half hunk).
          DIFF="$(gh pr diff "$PR_NUMBER" --repo "$REPO" || true)"
          if [ -z "$DIFF" ]; then echo "Empty diff; nothing to review."; exit 0; fi
          MAX=60000
          TRUNC_NOTE=""
          if [ "${#DIFF}" -gt "$MAX" ]; then
            DIFF="${DIFF:0:$MAX}"
            DIFF="${DIFF%$'\n'*}"
            TRUNC_NOTE="$(printf '\n\n> Note: the diff was long and was truncated at a line boundary; only the first part was reviewed.')"
          fi

          # 2) Optional per-repo style guide.
          STYLE=""
          [ -f .gemini/styleguide.md ] && STYLE="$(cat .gemini/styleguide.md)"

          # 3) Prior conversation (our reviews + human replies) for context-aware re-reviews.
          HIST_MAX=20000
          HISTORY="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate 2>/dev/null | jq -s -r '
              (add // [])
              | map(select((.body | startswith("## 🤖 AI Code Review")) or (.user.type == "User")))
              | map(if (.body | startswith("## 🤖 AI Code Review"))
                    then "### Your previous review:\n" + .body
                    else "### Developer response (" + .user.login + "):\n" + .body end)
              | join("\n\n---\n\n")' 2>/dev/null || true)"
          if [ "${#HISTORY}" -gt "$HIST_MAX" ]; then HISTORY="${HISTORY: -$HIST_MAX}"; fi

          # 4) Build the prompt.
          INSTRUCTIONS="$(printf '%s\n' \
            'You are a senior software engineer acting as a second reviewer on a GitHub pull request.' \
            'Review the current unified diff and write a concise, high-signal review in GitHub markdown.' \
            '' \
            'Use these sections (omit a severity bucket if it has no items):' \
            '## 📋 Summary — 2-3 sentences on what the PR does and its overall quality.' \
            '## 🔍 Findings — bullets grouped as 🔴 Critical, 🟠 High, 🟡 Medium, 🟢 Low.' \
            '  For each finding cite the file and approximate line, and give a specific, actionable fix.' \
            '## ✅ Positives — briefly note anything done well.' \
            '' \
            'Focus on correctness, security, performance, error handling and missing tests.' \
            'Only report real, verifiable issues; do not invent problems. If the diff is trivial or looks good, say so plainly.')"
          REREVIEW="$(printf '%s\n' \
            'If a PRIOR CONVERSATION section appears below, this is a RE-REVIEW. Treat it as a continuing two-way conversation:' \
            '- Begin with a "## 🔄 Since last review" section: ✅ Resolved (now fixed), 🤝 Acknowledged (the developer gave a sound reason not to change something and you agree — do not raise it again), ⚠️ Still open.' \
            '- Do NOT repeat resolved or acknowledged items under Findings; only include new or still-unresolved issues.' \
            '- If you disagree with a developer response, keep it open and briefly explain why. Change your mind when the reasoning is sound.')"
          PROMPT="${INSTRUCTIONS}

          ${REREVIEW}"
          if [ -n "$STYLE" ]; then
            PROMPT="${PROMPT}

          Team style guide to enforce:
          ${STYLE}"
          fi
          if [ -n "$HISTORY" ]; then
            PROMPT="${PROMPT}

          PRIOR CONVERSATION (your earlier reviews and the developer's responses, oldest first):
          ${HISTORY}"
          fi
          PROMPT="${PROMPT}

          Current unified diff to review:
          ${DIFF}"

          # 5) Model callers. Each echoes the review text.
          call_gemini() {
            local req resp text err
            req="$(jq -n --arg p "$PROMPT" '{contents:[{parts:[{text:$p}]}]}')"
            resp="$(curl -sS -m 180 "https://generativelanguage.googleapis.com/v1beta/models/${GMODEL}:generateContent?key=${GEMINI_API_KEY}" -H 'Content-Type: application/json' -d "$req" || true)"
            text="$(printf '%s' "$resp" | jq -r '.candidates[0].content.parts[0].text // empty')"
            err="$(printf '%s' "$resp" | jq -r '.error.message // empty')"
            [ -z "$text" ] && text="$(printf '⚠️ Could not generate review.\n\n```\n%s\n```' "${err:-no response}")"
            printf '%s' "$text"
          }
          call_openai() {
            local req resp text err prov base sort
            # Criteria-based routing (no single-host pin): no-training + quality-sorted + failover.
            # Default sort = throughput so a slow host is never chosen just for being cheap.
            sort="${AI_OR_SORT:-throughput}"
            if [ -n "${AI_OR_PROVIDERS:-}" ]; then
              # Restrict to an allow-list of trusted hosts, but still load-balance/fail over among them.
              base="$(jq -n --arg list "$AI_OR_PROVIDERS" --arg s "$sort" '{only:($list|split(",")|map(gsub("^ +| +$";""))), data_collection:"deny", sort:$s, allow_fallbacks:true}')"
            else
              # No allow-list: any zero-data-retention, non-training host (fails closed if none).
              base="$(jq -n --arg s "$sort" '{zdr:true, data_collection:"deny", sort:$s, allow_fallbacks:true}')"
            fi
            # Optional hard price ceiling ($/1M "input,output"), e.g. AI_OR_MAXPRICE="2,6".
            if [ -n "${AI_OR_MAXPRICE:-}" ]; then
              prov="$(printf '%s' "$base" | jq --arg mp "$AI_OR_MAXPRICE" '. + ($mp|split(",")|{max_price:{prompt:(.[0]|tonumber), completion:(.[1]|tonumber)}})')"
            else
              prov="$base"
            fi
            req="$(jq -n --arg m "$OMODEL" --arg p "$PROMPT" --argjson prov "$prov" '{model:$m, messages:[{role:"user", content:$p}], provider:$prov}')"
            resp="$(curl -sS -m 180 "${OBASE%/}/chat/completions" -H "Authorization: Bearer ${OPENROUTER_API_KEY}" -H 'Content-Type: application/json' -H 'HTTP-Referer: https://github.com' -H 'X-Title: PR Review' -d "$req" || true)"
            text="$(printf '%s' "$resp" | jq -r '.choices[0].message.content // empty')"
            err="$(printf '%s' "$resp" | jq -r '.error.message // empty')"
            [ -z "$text" ] && text="$(printf '⚠️ Could not generate review.\n\n```\n%s\n```' "${err:-no response}")"
            printf '%s' "$text"
          }
          post_review() {
            local body
            body="$(printf '## 🤖 AI Code Review — `%s`\n\n%s%s\n\n<sub>Automated review — not a substitute for human review.</sub>' "$1" "$2" "$TRUNC_NOTE")"
            printf '%s' "$body" | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -
          }

          # 6) Run the configured model(s).
          if [ "$DUAL" = "true" ]; then
            echo "Dual review: Gemini + GLM"
            post_review "$GMODEL" "$(call_gemini)"
            post_review "$OMODEL (OpenRouter)" "$(call_openai)"
          elif [ "$PRIMARY" = "openai" ] || [ "$PRIMARY" = "glm" ]; then
            echo "Single review: $OMODEL via ${OBASE}"
            post_review "$OMODEL (OpenRouter)" "$(call_openai)"
          else
            echo "Single review: $GMODEL"
            post_review "$GMODEL" "$(call_gemini)"
          fi
          echo "Done."
